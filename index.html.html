<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>Das Lazy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f2ed; --surface: #ffffff; --surface2: #faf8f5; --border: #e8e4de;
      --text: #1a1614; --muted: #7a736b; --accent: #c45e2a; --accent-light: #fdf0e8;
      --blue: #2563eb; --green: #16a34a; --green-light: #f0fdf4;
      --amber: #d97706; --amber-light: #fffbeb; --teal: #0891b2;
      --radius: 12px; --radius-sm: 8px;
      --bottom-nav-h: 64px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 15px; line-height: 1.6; overscroll-behavior: none; }
    .app { display: flex; flex-direction: column; min-height: 100vh; }

    /* ── HEADER ── */
    header { background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; }
    .header-inner { max-width: 1100px; margin: 0 auto; padding: 0 1.5rem; height: 60px; display: flex; align-items: center; gap: 1.5rem; }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-mark { font-size: 22px; }
    .logo h1 { font-family: 'DM Serif Display', serif; font-size: 20px; font-weight: 400; color: var(--accent); line-height: 1; }
    .logo-sub { font-size: 11px; color: var(--muted); letter-spacing: 0.05em; text-transform: uppercase; }
    .desktop-nav { display: flex; gap: 4px; margin-left: auto; }
    .nav-btn { background: none; border: none; padding: 7px 14px; border-radius: var(--radius-sm); cursor: pointer; font-family: inherit; font-size: 14px; color: var(--muted); font-weight: 500; transition: all 0.15s; min-height: 36px; }
    .nav-btn:hover { background: var(--bg); color: var(--text); }
    .nav-btn.active { background: var(--accent-light); color: var(--accent); }

    /* ── BOTTOM NAV ── */
    .bottom-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 20; background: var(--surface); border-top: 1px solid var(--border); padding-bottom: var(--safe-bottom); }
    .bottom-nav-inner { display: flex; height: var(--bottom-nav-h); }
    .bnav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; background: none; border: none; cursor: pointer; font-family: inherit; font-size: 10px; font-weight: 500; color: var(--muted); letter-spacing: 0.03em; text-transform: uppercase; padding: 8px 4px; }
    .bnav-btn.active { color: var(--accent); }
    .bnav-icon { width: 36px; height: 22px; border-radius: 11px; display: flex; align-items: center; justify-content: center; font-size: 16px; transition: background 0.15s; }
    .bnav-btn.active .bnav-icon { background: var(--accent-light); }

    /* ── MAIN ── */
    main { flex: 1; max-width: 1100px; margin: 0 auto; width: 100%; padding: 1.5rem 1.5rem 2rem; }
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
    .page-header h2 { font-family: 'DM Serif Display', serif; font-size: 24px; font-weight: 400; }
    .section-header { margin: 1.75rem 0 0.75rem; }
    .section-header h3 { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }

    /* ── STATS ── */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1.5rem; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; }
    .stat-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 4px; }
    .stat-value { font-size: 20px; font-weight: 600; }
    .stat-blue .stat-value { color: var(--blue); }
    .stat-green .stat-value { color: var(--green); }
    .stat-teal .stat-value { color: var(--teal); }
    .stat-amber .stat-value { color: var(--amber); }

    /* ── ARTIST SUMMARY ── */
    .artist-cards { display: flex; flex-direction: column; gap: 8px; }
    .artist-summary-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 0.9rem 1rem; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: background 0.1s; }
    .artist-summary-card:active { background: var(--bg); }
    .artist-summary-info { flex: 1; min-width: 0; }
    .artist-summary-info strong { font-size: 15px; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .artist-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--accent-light); color: var(--accent); font-size: 13px; font-weight: 600; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .artist-avatar.large { width: 46px; height: 46px; font-size: 15px; }
    .badge { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; }
    .badge-amber { background: var(--amber-light); color: var(--amber); }
    .badge-green { background: var(--green-light); color: var(--green); }

    /* ── ARTIST CARDS ── */
    .artist-list { display: flex; flex-direction: column; gap: 12px; }
    .artist-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; }
    .artist-card-top { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 0.9rem; padding-bottom: 0.9rem; border-bottom: 1px solid var(--border); }
    .artist-card-top h3 { font-size: 16px; font-weight: 600; }
    .ml-auto { margin-left: auto; }
    .artist-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .mini-stat { display: flex; flex-direction: column; }
    .mini-stat span { font-size: 14px; font-weight: 600; }
    .mini-stat label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .mini-stat.amber span { color: var(--amber); }
    .mini-stat.green span { color: var(--green); }

    /* commission badge on artist card */
    .commission-badge { display: inline-flex; align-items: center; gap: 4px; background: var(--accent-light); color: var(--accent); font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; margin-top: 3px; }
    .btn-edit-commission { background: none; border: 1px solid var(--border); color: var(--muted); cursor: pointer; font-family: inherit; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 20px; margin-top: 3px; margin-left: 4px; min-height: 0; }
    .btn-edit-commission:hover { border-color: var(--accent); color: var(--accent); }

    /* ── TABLE (desktop) ── */
    .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    table { width: 100%; border-collapse: collapse; background: var(--surface); border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); }
    th { padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); background: var(--surface2); border-bottom: 1px solid var(--border); }
    td { padding: 11px 14px; border-bottom: 1px solid var(--border); font-size: 14px; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--bg); }
    td.green { color: var(--green); font-weight: 500; }
    td.blue { color: var(--blue); font-weight: 500; }

    /* ── SALE CARDS (mobile) ── */
    .sale-cards { display: none; flex-direction: column; gap: 8px; }
    .sale-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 0.9rem 1rem; }
    .sale-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
    .sale-card-artist { font-weight: 600; font-size: 15px; }
    .sale-card-item { font-size: 13px; color: var(--muted); }
    .sale-card-meta { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
    .sale-card-date { font-size: 12px; color: var(--muted); }
    .sale-card-amounts { display: flex; gap: 16px; font-size: 13px; border-top: 1px solid var(--border); padding-top: 8px; }
    .sale-card-amounts .amt { display: flex; flex-direction: column; }
    .sale-card-amounts label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); }
    .amt-total { font-weight: 600; font-size: 15px; }
    .amt-cafe { color: var(--green); font-weight: 500; }
    .amt-artist { color: var(--blue); font-weight: 500; }

    /* ── PAYOUTS ── */
    .payout-pending { display: flex; flex-direction: column; gap: 8px; margin-bottom: 0.5rem; }
    .pending-card { background: var(--amber-light); border: 1px solid #fde68a; border-radius: var(--radius); padding: 0.8rem 1rem; display: flex; align-items: center; gap: 10px; }
    .pending-card .amber { color: var(--amber); font-weight: 600; }

    /* ── BUTTONS ── */
    .btn-primary { background: var(--accent); color: white; border: none; padding: 10px 18px; border-radius: var(--radius-sm); font-family: inherit; font-size: 14px; font-weight: 500; cursor: pointer; min-height: 44px; }
    .btn-primary:active { background: #9a4519; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); padding: 10px 18px; border-radius: var(--radius-sm); font-family: inherit; font-size: 14px; font-weight: 500; cursor: pointer; min-height: 44px; }
    .btn-danger-sm { background: none; border: none; color: #ccc; cursor: pointer; font-size: 15px; padding: 8px; min-width: 36px; min-height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 6px; }
    .btn-danger-sm:active { background: #fee2e2; color: #dc2626; }
    .btn-link { background: none; border: none; color: var(--accent); cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 500; padding: 4px 0; text-decoration: underline; }

    /* ── MODAL SHEET ── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: flex-end; justify-content: center; z-index: 100; }
    .modal { background: var(--surface); border-radius: 20px 20px 0 0; width: 100%; max-width: 560px; max-height: 92vh; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: var(--safe-bottom); }
    .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 0; }
    .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 0.9rem 1.25rem 0.5rem; }
    .modal-header h3 { font-size: 17px; font-weight: 600; }
    .modal-close { background: var(--bg); border: none; cursor: pointer; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; color: var(--muted); }

    /* ── FORM ── */
    .form { padding: 0.5rem 1.25rem 1.5rem; display: flex; flex-direction: column; gap: 6px; }
    .form label { font-size: 13px; font-weight: 600; color: var(--muted); margin-top: 6px; }
    .form input, .form select, .form textarea { border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 11px 12px; font-family: inherit; font-size: 16px; background: var(--surface); color: var(--text); width: 100%; min-height: 46px; }
    .form input:focus, .form select:focus, .form textarea:focus { outline: none; border-color: var(--accent); }
    .form textarea { resize: vertical; }
    .form-actions { display: flex; gap: 8px; margin-top: 10px; }
    .form-actions button { flex: 1; }
    .price-preview { background: var(--bg); border-radius: var(--radius-sm); padding: 10px 12px; font-size: 13px; display: flex; gap: 16px; color: var(--muted); }
    .price-preview strong { color: var(--text); }
    .outstanding-hint { font-size: 13px; color: var(--muted); padding: 4px 0; display: flex; align-items: center; flex-wrap: wrap; gap: 4px; }

    /* commission input row */
    .commission-row { display: flex; align-items: center; gap: 8px; }
    .commission-row input { flex: 1; }
    .commission-row .pct-label { font-size: 14px; color: var(--muted); font-weight: 500; white-space: nowrap; }

    /* ── MISC ── */
    .empty { color: var(--muted); font-size: 14px; font-style: italic; padding: 1rem 0; }
    .muted { color: var(--muted); font-size: 13px; }
    .loading { text-align: center; padding: 4rem; color: var(--muted); font-size: 16px; }

    /* ── DESKTOP ≥768px ── */
    @media (min-width: 768px) {
      .desktop-nav { display: flex; }
      .bottom-nav { display: none !important; }
      .sale-cards { display: none !important; }
      .table-wrap { display: block !important; }
      .stats-grid { grid-template-columns: repeat(4, 1fr); }
      .artist-stats { grid-template-columns: repeat(6, 1fr); }
      .form input, .form select, .form textarea { font-size: 14px; min-height: 40px; padding: 8px 12px; }
      .modal-overlay { align-items: center; padding: 1rem; }
      .modal { border-radius: var(--radius); max-height: 90vh; }
      .modal-handle { display: none; }
      .btn-primary:hover { background: #b0521f; }
      .btn-danger-sm:hover { background: #fee2e2; color: #dc2626; }
    }

    /* ── MOBILE <768px ── */
    @media (max-width: 767px) {
      .desktop-nav { display: none; }
      .bottom-nav { display: block; }
      main { padding: 1rem 1rem calc(var(--bottom-nav-h) + var(--safe-bottom) + 1rem); }
      .header-inner { padding: 0 1rem; height: 52px; }
      .logo-sub { display: none; }
      .page-header h2 { font-size: 21px; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
      .stat-card { padding: 0.85rem; }
      .stat-value { font-size: 17px; }
      .artist-stats { grid-template-columns: repeat(3, 1fr); }
      .sale-cards { display: flex; }
      .table-wrap { display: none; }
      .payout-pending { flex-direction: column; }
    }
  </style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;
const DEFAULT_COMMISSION = 0.30;

// ── PASTE YOUR FIREBASE CONFIG HERE ──────────────────────────────────────────
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCZUPk4_YCb0RUieWSzzq87gdqkkJ67_eM",
  authDomain: "das-lazy.firebaseapp.com",
  projectId: "das-lazy",
  storageBucket: "das-lazy.firebasestorage.app",
  messagingSenderId: "831176176893",
  appId: "1:831176176893:web:18d75d5c46dc6aa2d13a94",
};
// ─────────────────────────────────────────────────────────────────────────────

firebase.initializeApp(FIREBASE_CONFIG);
const db = firebase.firestore();

function fmt(n) {
  return new Intl.NumberFormat("de-AT", { style: "currency", currency: "EUR" }).format(n || 0);
}
function fmtDate(ts) {
  if (!ts) return "—";
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString("de-AT", { day: "2-digit", month: "2-digit", year: "numeric" });
}
function fmtPct(rate) {
  return (rate * 100).toFixed(0) + "%";
}

const NAV = [
  { id: "dashboard", icon: "☕", label: "Overview" },
  { id: "sales",     icon: "🏷",  label: "Sales"   },
  { id: "artists",   icon: "🎨", label: "Artists" },
  { id: "payouts",   icon: "💶", label: "Payouts" },
];

function App() {
  const [tab, setTab] = useState("dashboard");
  const [artists, setArtists] = useState([]);
  const [sales, setSales] = useState([]);
  const [payouts, setPayouts] = useState([]);
  const [loading, setLoading] = useState(true);
  const [modal, setModal] = useState(null);

  useEffect(() => {
    const u1 = db.collection("artists").onSnapshot(s =>
      setArtists(s.docs.map(d => ({ id: d.id, ...d.data() }))));
    const u2 = db.collection("sales").orderBy("date", "desc").onSnapshot(s =>
      setSales(s.docs.map(d => ({ id: d.id, ...d.data() }))));
    const u3 = db.collection("payouts").orderBy("date", "desc").onSnapshot(s => {
      setPayouts(s.docs.map(d => ({ id: d.id, ...d.data() })));
      setLoading(false);
    });
    return () => { u1(); u2(); u3(); };
  }, []);

  function getArtist(id) { return artists.find(a => a.id === id); }
  function artistName(id) { return getArtist(id)?.name || "Unknown"; }
  function artistCommission(id) {
    const a = getArtist(id);
    // support commission stored as 0–100 (percent) or 0–1 (fraction); default 30%
    if (a?.commission != null) {
      const v = parseFloat(a.commission);
      return v > 1 ? v / 100 : v;
    }
    return DEFAULT_COMMISSION;
  }

  function artistStats(artistId) {
    const commission = artistCommission(artistId);
    const as = sales.filter(s => s.artistId === artistId);
    const ap = payouts.filter(p => p.artistId === artistId);
    const rev = as.reduce((s, x) => s + x.price, 0);
    const cafe = rev * commission;
    const owed = rev - cafe;
    const paid = ap.reduce((s, x) => s + x.amount, 0);
    return { totalRevenue: rev, cafeCut: cafe, artistOwed: owed, totalPaid: paid, outstanding: owed - paid, salesCount: as.length, commission };
  }

  if (loading) return <div className="loading">Loading…</div>;

  const totalRev = sales.reduce((s, x) => s + x.price, 0);
  const totalCafe = artists.reduce((sum, a) => {
    const as = sales.filter(s => s.artistId === a.id);
    const rate = artistCommission(a.id);
    return sum + as.reduce((s, x) => s + x.price * rate, 0);
  }, 0);
  const totalPaid = payouts.reduce((s, x) => s + x.amount, 0);
  const totalOut = (totalRev - totalCafe) - totalPaid;

  return (
    <div className="app">
      <header>
        <div className="header-inner">
          <div className="logo">
            <span className="logo-mark">☕</span>
            <div><h1>Das Lazy</h1><div className="logo-sub">Artist Sales Tracker</div></div>
          </div>
          <nav className="desktop-nav">
            {NAV.map(n => (
              <button key={n.id} className={`nav-btn ${tab===n.id?"active":""}`} onClick={() => setTab(n.id)}>
                {n.label}
              </button>
            ))}
          </nav>
        </div>
      </header>

      <main>
        {tab==="dashboard" && <Dashboard totalRev={totalRev} totalCafe={totalCafe} totalOut={totalOut} totalPaid={totalPaid} artists={artists} artistStats={artistStats} setTab={setTab} onAddSale={() => setModal("sale")} />}
        {tab==="sales"     && <SalesTab sales={sales} artists={artists} artistName={artistName} artistCommission={artistCommission} onAdd={() => setModal("sale")} />}
        {tab==="artists"   && <ArtistsTab artists={artists} artistStats={artistStats} onAdd={() => setModal("artist")} />}
        {tab==="payouts"   && <PayoutsTab payouts={payouts} artists={artists} artistName={artistName} artistStats={artistStats} onAdd={() => setModal("payout")} />}
      </main>

      <nav className="bottom-nav">
        <div className="bottom-nav-inner">
          {NAV.map(n => (
            <button key={n.id} className={`bnav-btn ${tab===n.id?"active":""}`} onClick={() => setTab(n.id)}>
              <span className="bnav-icon">{n.icon}</span>
              {n.label}
            </button>
          ))}
        </div>
      </nav>

      {modal==="artist" && <AddArtistModal onClose={() => setModal(null)} />}
      {modal==="sale"   && <AddSaleModal artists={artists} artistCommission={artistCommission} onClose={() => setModal(null)} />}
      {modal==="payout" && <AddPayoutModal artists={artists} artistStats={artistStats} onClose={() => setModal(null)} />}
    </div>
  );
}

function Dashboard({ totalRev, totalCafe, totalOut, totalPaid, artists, artistStats, setTab, onAddSale }) {
  return (
    <div className="page">
      <div className="page-header">
        <h2>Overview</h2>
        <button className="btn-primary" onClick={onAddSale}>+ Sale</button>
      </div>
      <div className="stats-grid">
        <div className="stat-card stat-blue"><p className="stat-label">Revenue</p><p className="stat-value">{fmt(totalRev)}</p></div>
        <div className="stat-card stat-green"><p className="stat-label">Café cut</p><p className="stat-value">{fmt(totalCafe)}</p></div>
        <div className="stat-card stat-teal"><p className="stat-label">Paid out</p><p className="stat-value">{fmt(totalPaid)}</p></div>
        <div className={`stat-card stat-${totalOut > 0 ? "amber" : "green"}`}><p className="stat-label">Outstanding</p><p className="stat-value">{fmt(totalOut)}</p></div>
      </div>
      <div className="section-header"><h3>Artists</h3></div>
      <div className="artist-cards">
        {artists.length === 0 && <p className="empty">No artists yet — add one in the Artists tab.</p>}
        {artists.map(a => {
          const s = artistStats(a.id);
          return (
            <div key={a.id} className="artist-summary-card" onClick={() => setTab("artists")}>
              <div className="artist-avatar">{a.name.slice(0,2).toUpperCase()}</div>
              <div className="artist-summary-info">
                <strong>{a.name}</strong>
                <span className="muted">{s.salesCount} sales · {fmt(s.totalRevenue)} · café {fmtPct(s.commission)}</span>
              </div>
              <div className={`badge ${s.outstanding > 0.01 ? "badge-amber" : "badge-green"}`}>
                {s.outstanding > 0.01 ? fmt(s.outstanding) : "Settled"}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function SalesTab({ sales, artists, artistName, artistCommission, onAdd }) {
  const del = id => { if(confirm("Delete this sale?")) db.collection("sales").doc(id).delete(); };
  return (
    <div className="page">
      <div className="page-header"><h2>Sales</h2><button className="btn-primary" onClick={onAdd}>+ Add Sale</button></div>
      {sales.length === 0 && <p className="empty">No sales recorded yet.</p>}
      <div className="sale-cards">
        {sales.map(s => {
          const rate = artistCommission(s.artistId);
          return (
            <div key={s.id} className="sale-card">
              <div className="sale-card-top">
                <div>
                  <div className="sale-card-artist">{artistName(s.artistId)}</div>
                  <div className="sale-card-item">{s.item}</div>
                </div>
                <div className="sale-card-meta">
                  <span className="sale-card-date">{fmtDate(s.date)}</span>
                  <button className="btn-danger-sm" onClick={() => del(s.id)}>✕</button>
                </div>
              </div>
              <div className="sale-card-amounts">
                <div className="amt"><label>Total</label><span className="amt-total">{fmt(s.price)}</span></div>
                <div className="amt"><label>Café ({fmtPct(rate)})</label><span className="amt-cafe">{fmt(s.price * rate)}</span></div>
                <div className="amt"><label>Artist ({fmtPct(1-rate)})</label><span className="amt-artist">{fmt(s.price * (1-rate))}</span></div>
              </div>
            </div>
          );
        })}
      </div>
      <div className="table-wrap">
        {sales.length > 0 && (
          <table>
            <thead><tr><th>Date</th><th>Artist</th><th>Item</th><th>Price</th><th>Café</th><th>Artist</th><th></th></tr></thead>
            <tbody>
              {sales.map(s => {
                const rate = artistCommission(s.artistId);
                return (
                  <tr key={s.id}>
                    <td className="muted">{fmtDate(s.date)}</td>
                    <td><strong>{artistName(s.artistId)}</strong></td>
                    <td>{s.item}</td>
                    <td>{fmt(s.price)}</td>
                    <td className="green">{fmt(s.price * rate)} <span style={{fontSize:11,opacity:0.7}}>({fmtPct(rate)})</span></td>
                    <td className="blue">{fmt(s.price * (1-rate))} <span style={{fontSize:11,opacity:0.7}}>({fmtPct(1-rate)})</span></td>
                    <td><button className="btn-danger-sm" onClick={() => del(s.id)}>✕</button></td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        )}
      </div>
    </div>
  );
}

function ArtistsTab({ artists, artistStats, onAdd }) {
  const [editingCommission, setEditingCommission] = useState(null);
  return (
    <div className="page">
      <div className="page-header"><h2>Artists</h2><button className="btn-primary" onClick={onAdd}>+ Add Artist</button></div>
      {artists.length === 0 && <p className="empty">No artists yet.</p>}
      <div className="artist-list">
        {artists.map(a => {
          const s = artistStats(a.id);
          return (
            <div key={a.id} className="artist-card">
              <div className="artist-card-top">
                <div className="artist-avatar large">{a.name.slice(0,2).toUpperCase()}</div>
                <div style={{flex:1,minWidth:0}}>
                  <h3>{a.name}</h3>
                  <div style={{display:"flex",alignItems:"center",flexWrap:"wrap",gap:4,marginTop:2}}>
                    <span className="commission-badge">☕ {fmtPct(s.commission)} café</span>
                    <button className="btn-edit-commission" onClick={() => setEditingCommission({ id: a.id, name: a.name, current: s.commission })}>✏ Edit</button>
                  </div>
                  {a.email && <p className="muted" style={{marginTop:2}}>{a.email}</p>}
                  {a.notes && <p className="muted" style={{fontStyle:"italic"}}>{a.notes}</p>}
                </div>
                <button className="btn-danger-sm ml-auto" onClick={() => { if(confirm("Delete artist?")) db.collection("artists").doc(a.id).delete(); }}>✕</button>
              </div>
              <div className="artist-stats">
                <div className="mini-stat"><span>{s.salesCount}</span><label>Sales</label></div>
                <div className="mini-stat"><span>{fmt(s.totalRevenue)}</span><label>Revenue</label></div>
                <div className="mini-stat"><span>{fmt(s.cafeCut)}</span><label>Café cut</label></div>
                <div className="mini-stat"><span>{fmt(s.artistOwed)}</span><label>Artist total</label></div>
                <div className="mini-stat"><span>{fmt(s.totalPaid)}</span><label>Paid out</label></div>
                <div className={`mini-stat ${s.outstanding > 0.01 ? "amber" : "green"}`}>
                  <span>{fmt(s.outstanding)}</span><label>Outstanding</label>
                </div>
              </div>
            </div>
          );
        })}
      </div>
      {editingCommission && (
        <EditCommissionModal
          artist={editingCommission}
          onClose={() => setEditingCommission(null)}
        />
      )}
    </div>
  );
}

function EditCommissionModal({ artist, onClose }) {
  const [commission, setCommission] = useState((artist.current * 100).toFixed(0));
  const [saving, setSaving] = useState(false);
  const commissionNum = parseFloat(commission);
  const commissionValid = !isNaN(commissionNum) && commissionNum >= 0 && commissionNum <= 100;
  async function save() {
    if (!commissionValid) return;
    setSaving(true);
    await db.collection("artists").doc(artist.id).update({ commission: commissionNum / 100 });
    onClose();
  }
  return (
    <Modal title={`Edit commission — ${artist.name}`} onClose={onClose}>
      <div className="form">
        <label>Café commission (%)</label>
        <div className="commission-row">
          <input
            value={commission}
            onChange={e => setCommission(e.target.value)}
            type="number"
            min="0"
            max="100"
            step="1"
            placeholder="30"
            inputMode="decimal"
            autoFocus
            style={!commissionValid && commission !== "" ? {borderColor:"#dc2626"} : {}}
          />
          <span className="pct-label">% → artist gets {commissionValid ? (100 - commissionNum).toFixed(0) : "—"}%</span>
        </div>
        <div className="form-actions">
          <button className="btn-secondary" onClick={onClose}>Cancel</button>
          <button className="btn-primary" onClick={save} disabled={saving || !commissionValid}>
            {saving ? "Saving…" : "Save"}
          </button>
        </div>
      </div>
    </Modal>
  );
}

function PayoutsTab({ payouts, artists, artistName, artistStats, onAdd }) {
  const pending = artists.filter(a => artistStats(a.id).outstanding > 0.01);
  const del = id => { if(confirm("Delete this payout?")) db.collection("payouts").doc(id).delete(); };
  return (
    <div className="page">
      <div className="page-header"><h2>Payouts</h2><button className="btn-primary" onClick={onAdd}>+ Record Payout</button></div>
      <div className="section-header"><h3>Pending</h3></div>
      <div className="payout-pending">
        {pending.length === 0 && <p className="empty">All settled up 🎉</p>}
        {pending.map(a => {
          const s = artistStats(a.id);
          return (
            <div key={a.id} className="pending-card">
              <div className="artist-avatar">{a.name.slice(0,2).toUpperCase()}</div>
              <div style={{flex:1}}>
                <strong>{a.name}</strong>
                <p className="muted">Owed: <span className="amber">{fmt(s.outstanding)}</span></p>
              </div>
            </div>
          );
        })}
      </div>
      <div className="section-header"><h3>History</h3></div>
      {payouts.length === 0 && <p className="empty">No payouts recorded yet.</p>}
      <div className="sale-cards">
        {payouts.map(p => (
          <div key={p.id} className="sale-card">
            <div className="sale-card-top">
              <div>
                <div className="sale-card-artist">{artistName(p.artistId)}</div>
                <div className="sale-card-item">{p.note || "—"}</div>
              </div>
              <div className="sale-card-meta">
                <span className="sale-card-date">{fmtDate(p.date)}</span>
                <button className="btn-danger-sm" onClick={() => del(p.id)}>✕</button>
              </div>
            </div>
            <div style={{paddingTop:8,borderTop:"1px solid var(--border)",fontWeight:600,color:"var(--blue)",fontSize:15}}>{fmt(p.amount)}</div>
          </div>
        ))}
      </div>
      <div className="table-wrap">
        {payouts.length > 0 && (
          <table>
            <thead><tr><th>Date</th><th>Artist</th><th>Amount</th><th>Note</th><th></th></tr></thead>
            <tbody>
              {payouts.map(p => (
                <tr key={p.id}>
                  <td className="muted">{fmtDate(p.date)}</td>
                  <td><strong>{artistName(p.artistId)}</strong></td>
                  <td className="blue">{fmt(p.amount)}</td>
                  <td className="muted">{p.note || "—"}</td>
                  <td><button className="btn-danger-sm" onClick={() => del(p.id)}>✕</button></td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>
    </div>
  );
}

function Modal({ title, onClose, children }) {
  return (
    <div className="modal-overlay" onClick={e => e.target===e.currentTarget && onClose()}>
      <div className="modal">
        <div className="modal-handle" />
        <div className="modal-header">
          <h3>{title}</h3>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        {children}
      </div>
    </div>
  );
}

function AddArtistModal({ onClose }) {
  const [name, setName] = useState("");
  const [email, setEmail] = useState("");
  const [notes, setNotes] = useState("");
  const [commission, setCommission] = useState("30");
  const [saving, setSaving] = useState(false);

  const commissionNum = parseFloat(commission);
  const commissionValid = !isNaN(commissionNum) && commissionNum >= 0 && commissionNum <= 100;

  async function save() {
    if (!name.trim() || !commissionValid) return;
    setSaving(true);
    await db.collection("artists").add({
      name: name.trim(),
      email,
      notes,
      commission: commissionNum / 100,   // store as fraction 0–1
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    onClose();
  }
  return (
    <Modal title="Add Artist" onClose={onClose}>
      <div className="form">
        <label>Name *</label>
        <input value={name} onChange={e => setName(e.target.value)} placeholder="Artist name" autoFocus />
        <label>Café commission (%) *</label>
        <div className="commission-row">
          <input
            value={commission}
            onChange={e => setCommission(e.target.value)}
            type="number"
            min="0"
            max="100"
            step="1"
            placeholder="30"
            inputMode="decimal"
            style={!commissionValid && commission !== "" ? {borderColor:"#dc2626"} : {}}
          />
          <span className="pct-label">%  →  artist gets {commissionValid ? (100 - commissionNum).toFixed(0) : "—"}%</span>
        </div>
        <label>Email</label>
        <input value={email} onChange={e => setEmail(e.target.value)} placeholder="artist@email.com" type="email" />
        <label>Notes</label>
        <textarea value={notes} onChange={e => setNotes(e.target.value)} placeholder="Any notes…" rows={2} />
        <div className="form-actions">
          <button className="btn-secondary" onClick={onClose}>Cancel</button>
          <button className="btn-primary" onClick={save} disabled={saving || !name.trim() || !commissionValid}>
            {saving ? "Saving…" : "Add Artist"}
          </button>
        </div>
      </div>
    </Modal>
  );
}

function AddSaleModal({ artists, artistCommission, onClose }) {
  const [artistId, setArtistId] = useState(artists[0]?.id || "");
  const [item, setItem] = useState("");
  const [price, setPrice] = useState("");
  const [date, setDate] = useState(new Date().toISOString().slice(0,10));
  const [saving, setSaving] = useState(false);

  const rate = artistId ? artistCommission(artistId) : DEFAULT_COMMISSION;

  async function save() {
    if (!artistId || !item.trim() || !price) return;
    setSaving(true);
    await db.collection("sales").add({ artistId, item: item.trim(), price: parseFloat(price), date: new Date(date), createdAt: firebase.firestore.FieldValue.serverTimestamp() });
    onClose();
  }
  return (
    <Modal title="Add Sale" onClose={onClose}>
      <div className="form">
        <label>Artist *</label>
        <select value={artistId} onChange={e => setArtistId(e.target.value)}>
          {artists.map(a => <option key={a.id} value={a.id}>{a.name}</option>)}
        </select>
        {artistId && (
          <div style={{fontSize:12,color:"var(--muted)",marginTop:2}}>
            Commission: café {fmtPct(rate)} / artist {fmtPct(1-rate)}
          </div>
        )}
        <label>Item *</label>
        <input value={item} onChange={e => setItem(e.target.value)} placeholder="e.g. Print, Painting, Mug…" />
        <label>Price (€) *</label>
        <input value={price} onChange={e => setPrice(e.target.value)} type="number" min="0" step="0.01" placeholder="0.00" inputMode="decimal" />
        {price && (
          <div className="price-preview">
            <span>Café ({fmtPct(rate)}): <strong>{fmt(parseFloat(price) * rate)}</strong></span>
            <span>Artist ({fmtPct(1-rate)}): <strong>{fmt(parseFloat(price) * (1-rate))}</strong></span>
          </div>
        )}
        <label>Date *</label>
        <input value={date} onChange={e => setDate(e.target.value)} type="date" />
        <div className="form-actions">
          <button className="btn-secondary" onClick={onClose}>Cancel</button>
          <button className="btn-primary" onClick={save} disabled={saving || !artistId || !item.trim() || !price}>{saving ? "Saving…" : "Record Sale"}</button>
        </div>
      </div>
    </Modal>
  );
}

function AddPayoutModal({ artists, artistStats, onClose }) {
  const [artistId, setArtistId] = useState(artists[0]?.id || "");
  const [amount, setAmount] = useState("");
  const [note, setNote] = useState("");
  const [date, setDate] = useState(new Date().toISOString().slice(0,10));
  const [saving, setSaving] = useState(false);
  const stats = artistId ? artistStats(artistId) : null;
  async function save() {
    if (!artistId || !amount) return;
    setSaving(true);
    await db.collection("payouts").add({ artistId, amount: parseFloat(amount), note, date: new Date(date), createdAt: firebase.firestore.FieldValue.serverTimestamp() });
    onClose();
  }
  return (
    <Modal title="Record Payout" onClose={onClose}>
      <div className="form">
        <label>Artist *</label>
        <select value={artistId} onChange={e => setArtistId(e.target.value)}>
          {artists.map(a => <option key={a.id} value={a.id}>{a.name}</option>)}
        </select>
        {stats && (
          <div className="outstanding-hint">
            Outstanding: <strong>{fmt(stats.outstanding)}</strong>
            {stats.outstanding > 0.01 && <button className="btn-link" onClick={() => setAmount(stats.outstanding.toFixed(2))}>Use this</button>}
          </div>
        )}
        <label>Amount (€) *</label>
        <input value={amount} onChange={e => setAmount(e.target.value)} type="number" min="0" step="0.01" placeholder="0.00" inputMode="decimal" />
        <label>Note</label>
        <input value={note} onChange={e => setNote(e.target.value)} placeholder="e.g. Bank transfer, cash…" />
        <label>Date *</label>
        <input value={date} onChange={e => setDate(e.target.value)} type="date" />
        <div className="form-actions">
          <button className="btn-secondary" onClick={onClose}>Cancel</button>
          <button className="btn-primary" onClick={save} disabled={saving || !artistId || !amount}>{saving ? "Saving…" : "Record Payout"}</button>
        </div>
      </div>
    </Modal>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
